# goreleaser 설정 — `git tag vX.Y.Z && git push --tags` 로 릴리스가 시작되면
# GitHub Actions(.github/workflows/release.yml)가 이 파일대로 빌드·배포한다.
version: 2

project_name: kindle-cli

builds:
  - main: .
    binary: kindle-cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: checksums.txt

# release notes come from CHANGELOG.md (extracted by the release workflow
# and passed via --release-notes), not from commit titles
changelog:
  disable: true

release:
  header: |
    ## Install

    ```console
    curl -fsSL https://raw.githubusercontent.com/seapy/kindle-cli/main/install.sh | sh
    ```
  footer: |
    ---
    Full history: [CHANGELOG.md](https://github.com/seapy/kindle-cli/blob/main/CHANGELOG.md)

    > Device push (MTP) is Linux-only (`gio`/`gvfs-mtp` required). The
    > macOS/Windows binaries still do the EPUB → AZW3 (PDOC) conversion;
    > copy the converted file to the device yourself.
